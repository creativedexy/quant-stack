general:
  base_currency: GBP
  timezone: Europe/London
  log_level: INFO
  data_dir: data
  random_seed: 42

universe:
  name: default
  tickers: ["SHEL.L", "BP.L", "HSBA.L", "AZN.L", "ULVR.L"]
  benchmark: "^FTSE"

data:
  source: synthetic
  start_date: "2020-01-01"
  end_date: null
  interval: 1d
  fields: ["Open", "High", "Low", "Close", "Volume"]
  adjust_prices: true
  output_format: parquet

indicators:
  sma:
    windows: [5, 10, 20, 50, 200]

  ema:
    windows: [12, 26]

  rsi:
    window: 14

  macd:
    fast: 12
    slow: 26
    signal: 9

  bollinger_bands:
    window: 20
    num_std: 2.0

  atr:
    window: 14

features:
  technical:
    sma_windows: [5, 10, 20, 50, 200]
    ema_windows: [12, 26]
    rsi_window: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_window: 20
    bb_num_std: 2.0
    atr_window: 14
    volatility_windows: [21, 63]
  returns:
    windows: [1, 5, 10, 21, 63, 252]
    log_returns: true

models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_leaf: 20
    max_features: "sqrt"
  gradient_boosting:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    min_samples_leaf: 20
    subsample: 0.8
  evaluation:
    n_splits: 5
    gap: 5
    min_train_size: 252
  automl:
    n_folds: 3
    clf_models: ["lr", "rf", "gbc", "et", "lightgbm"]
    reg_models: ["lr", "rf", "gbr", "et", "lightgbm"]

portfolio:
  default_method: mean_variance
  methods:
    - mean_variance
    - min_cvar
    - risk_parity
    - equal_weight
  constraints:
    max_weight: 0.20
    min_weight: 0.00
  risk_free_rate: 0.045
  covariance_method: ledoit
  risk:
    confidence_level: 0.95
    correlation_flag_threshold: 0.85

backtest:
  initial_capital: 100000
  commission_pct: 0.001
  slippage_pct: 0.0005
  strategies:
    mean_reversion:
      rsi_lower: 30
      rsi_upper: 70
    momentum:
      sma_window: 50

execution:
  mode: paper  # paper or live — NEVER default to live
  broker:
    host: "127.0.0.1"
    port: 7497
    client_id: 1
    timeout: 10
    max_retries: 3
    retry_delay: 2
  risk:
    max_trade_pct: 0.10  # max 10% of portfolio per single trade
    max_daily_trades: 20
  account:
    base_currency: GBP
